spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_service_db
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
#  flyway:
#    enabled: true
#    locations: classpath:db/migration
  cloud:
    openfeign:
      client:
        config:
          user-service:
            connect-timeout: 3000
            read-timeout: 5000

jwt:
  secret: ${JWT_SECRET:your-super-secret-key-must-be-32-chars-min}
  access-token-expiry-ms: 900000
  refresh-token-expiry-days: 7

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method
