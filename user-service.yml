# ─────────────────────────────────────────────────────────────
# USER SERVICE CONFIGURATION
# Eureka config inherited from application.yml in config-server
# ─────────────────────────────────────────────────────────────

spring:
  # ─────────────────────────────────────────────────────────────
  # DATASOURCE — MySQL
  # ─────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/user_service_db
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
#    driver-class-name: com.mysql.cj.jdbc.Driver

  # ─────────────────────────────────────────────────────────────
  # JPA / HIBERNATE
  # ddl-auto: update — auto-creates/alters tables in dev.
  # Switch to validate in production (run Flyway/Liquibase instead).
  # ─────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true

  # ─────────────────────────────────────────────────────────────
  # REDIS — used for user profile caching (2h TTL)
  # Keys: user:profile:id:<uuid> and user:profile:email:<email>
  # ─────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# ─────────────────────────────────────────────────────────────
# ACTUATOR
# ─────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ─────────────────────────────────────────────────────────────
# SWAGGER — API docs UI
# /api-docs       → raw OpenAPI JSON spec
# /swagger-ui.html → interactive UI
# ─────────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
